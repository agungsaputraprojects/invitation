<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Undangan Otonan - Tunggasemi & Devinikha</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Dancing+Script:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="cover-styles.css" />
    </head>
    <body>
        <!-- Animated Background -->
        <div class="bg-elements">
            <div class="butterfly">🦋</div>
            <div class="butterfly">🦋</div>
            <div class="butterfly">🦋</div>

            <div class="flower-petals">
                <div class="petal">🌸</div>
                <div class="petal">🌺</div>
                <div class="petal">🏵️</div>
                <div class="petal">🌸</div>
                <div class="petal">🌺</div>
                <div class="petal">🏵️</div>
                <div class="petal">🌸</div>
                <div class="petal">🌺</div>
                <div class="petal">🏵️</div>
            </div>
        </div>

        <!-- Decorative Corners -->
        <div class="decorative-corner corner-tl">🕉️</div>
        <div class="decorative-corner corner-tr">🌺</div>
        <div class="decorative-corner corner-bl">🌸</div>
        <div class="decorative-corner corner-br">🏵️</div>

        <!-- Main Content -->
        <div class="cover-container">
            <div class="cover-header">
                <div class="cover-title">🕉️ Om Swastiastu 🕉️</div>
                <div class="cover-subtitle">
                    Undangan Upacara Otonan 3 Sasih
                </div>
            </div>

            <div class="main-photo-container">
                <div class="photo-frame">
                    <div class="main-photo">
                        👶👶<br />
                        <div style="font-size: 24px; margin-top: 10px">
                            Kembar Cantik
                        </div>
                    </div>
                </div>
            </div>

            <div class="guest-info">
                <div class="guest-label">Kepada Bapak/Ibu/Saudara/i</div>
                <div class="guest-name">Keluarga Bahagia</div>
                <div class="apology-text">
                    Mohon maaf apabila ada kesalahan penulisan nama/gelar.<br />
                    Kehadiran dan doa restu Anda adalah kehormatan bagi kami.
                </div>
            </div>

            <div class="cta-container">
                <button class="cta-button" onclick="openInvitation()">
                    📨 Buka Undangan
                    <span class="button-icon">✨</span>
                </button>
            </div>
        </div>

        <script src="cover-script.js"></script>

</html>
